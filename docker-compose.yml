services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apexcare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apexcare_dev_only}
      POSTGRES_DB: ${POSTGRES_DB:-apexcare_dev}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - apexcare_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-apexcare} -d ${POSTGRES_DB:-apexcare_dev}']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  apexcare_pgdata:
