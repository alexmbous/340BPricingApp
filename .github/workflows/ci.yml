name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.11.0'
  PNPM_VERSION: '9.12.0'
  TURBO_TELEMETRY_DISABLED: '1'

jobs:
  lint-and-typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @apexcare/api prisma generate
      - run: pnpm lint
      - run: pnpm typecheck

  api-test:
    name: API tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: apexcare
          POSTGRES_PASSWORD: apexcare_dev_only
          POSTGRES_DB: apexcare_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://apexcare:apexcare_dev_only@localhost:5432/apexcare_test?schema=public
      JWT_ACCESS_SECRET: ci-access-secret-at-least-thirty-two-characters-long-xxxxxxxx
      JWT_REFRESH_SECRET: ci-refresh-secret-at-least-thirty-two-characters-long-yyyyyyy
      PROVIDERS_MODE: mock
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @apexcare/api prisma migrate deploy
      - run: pnpm --filter @apexcare/api test
      - run: pnpm --filter @apexcare/api test:e2e

  docker-build:
    name: Docker build (API)
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
