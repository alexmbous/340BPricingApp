name: Deploy API

# Builds + pushes the API image to Amazon ECR and deploys to ECS Fargate.
#
# DISABLED FOR AUTO-TRIGGERS UNTIL AWS IS WIRED UP.
# Once the following GitHub secrets are configured, re-enable the
# `push` trigger below to auto-deploy on main / tagged releases:
#   AWS_ROLE_TO_ASSUME     — IAM role with ECR/ECS deploy permissions
#   AWS_REGION             — e.g. us-east-1
#   ECR_REPOSITORY         — e.g. apexcare/api
#   ECS_CLUSTER_STAGING    — cluster name
#   ECS_SERVICE_STAGING    — service name
#   ECS_CLUSTER_PRODUCTION — cluster name
#   ECS_SERVICE_PRODUCTION — service name

on:
  # Re-enable when AWS secrets are configured:
  # push:
  #   branches: [main]
  #   tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    name: Build, push, and deploy
    runs-on: ubuntu-latest
    environment:
      name: ${{ startsWith(github.ref, 'refs/tags/v') && 'production' || (github.event.inputs.environment || 'staging') }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: img
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'staging' }}

      - name: Force new ECS deployment
        env:
          CLUSTER: ${{ startsWith(github.ref, 'refs/tags/v') && secrets.ECS_CLUSTER_PRODUCTION || secrets.ECS_CLUSTER_STAGING }}
          SERVICE: ${{ startsWith(github.ref, 'refs/tags/v') && secrets.ECS_SERVICE_PRODUCTION || secrets.ECS_SERVICE_STAGING }}
        run: |
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --force-new-deployment \
            --no-cli-pager
